<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kda log viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #1a1b26;
    --bg-panel: #24283b;
    --bg-entry: #1f2335;
    --border: #3b4261;
    --text: #c0caf5;
    --text-dim: #565f89;
    --text-bright: #ffffff;
    --accent: #7aa2f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar h1 {
    font-size: 14px;
    color: var(--accent);
    white-space: nowrap;
  }
  .topbar input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .topbar input[type="text"]:focus { border-color: var(--accent); }
  .topbar label {
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .conn-status {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .conn-status.live { color: #9ece6a; }
  .conn-status.dead { color: #f7768e; }
  /* Layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  /* Sidebar */
  .sidebar {
    width: 200px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 8px 0;
  }
  .sidebar-header {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 16px 8px;
    letter-spacing: 1px;
  }
  .cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px;
    cursor: pointer;
    font-size: 12px;
  }
  .cat-item:hover { background: rgba(122,162,247,0.1); }
  .cat-item .badge {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-item .name { flex: 1; }
  .cat-item .count {
    color: var(--text-dim);
    font-size: 11px;
  }
  .cat-item input { accent-color: var(--accent); }
  /* Log list */
  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .log-entry {
    padding: 4px 16px;
    border-bottom: 1px solid rgba(59,66,97,0.3);
    font-size: 12px;
    line-height: 1.6;
  }
  .log-entry:hover { background: rgba(122,162,247,0.05); }
  .log-entry .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .log-entry .ts {
    color: var(--text-dim);
    font-size: 11px;
    white-space: nowrap;
  }
  .log-entry .cat {
    font-size: 10px;
    font-weight: bold;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .log-entry .msg {
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 13px;
  }
  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .view-toggle button {
    background: var(--bg);
    border: none;
    color: var(--text-dim);
    padding: 5px 14px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--accent);
    color: var(--bg);
  }
  .view-toggle button:hover:not(.active) {
    color: var(--text);
  }
  /* Chart area */
  .chart-area {
    flex: 1;
    padding: 16px;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>kda logs</h1>
  <div class="view-toggle">
    <button id="btnLogs" class="active">Logs</button>
    <button id="btnChart">Chart</button>
  </div>
  <input type="text" id="search" placeholder="Search..." autocomplete="off">
  <label><input type="checkbox" id="autoscroll" checked> Auto-scroll</label>
  <span class="conn-status" id="conn">connecting...</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Categories</div>
    <div id="categories"></div>
  </div>
  <div class="log-area" id="logArea">
    <div class="empty">Loading...</div>
  </div>
  <div class="chart-area" id="chartArea" style="display:none">
    <canvas id="tokenChart"></canvas>
  </div>
</div>

<script>
const COLORS = {
  "loop": "#7aa2f7",
  "prompt-segments": "#bb9af7",
  "context-manager": "#9ece6a",
  "tool-stats": "#7dcfff",
  "token-usage": "#7aa2f7",
  "request": "#e0af68",
  "response": "#9d7cd8",
  "tool-call": "#7dcfff",
  "tool-result": "#9ece6a",
  "exec": "#89ddff",
  "lazy-load": "#ff9e64",
  "session": "#73daca",
  "conv": "#94e2d5",
  "error": "#f7768e",
  "stream-error": "#f7768e",
  "stream-unknown": "#f7768e",
  "abort": "#f7768e",
  "system": "#565f89",
};

const allEntries = [];
const enabledCats = new Set();
let searchTerm = "";

const logArea = document.getElementById("logArea");
const catList = document.getElementById("categories");
const searchInput = document.getElementById("search");
const autoscrollBox = document.getElementById("autoscroll");
const connStatus = document.getElementById("conn");

function colorFor(cat) {
  return COLORS[cat] || "#a9b1d6";
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function shouldShow(entry) {
  if (enabledCats.size > 0 && !enabledCats.has(entry.category)) return false;
  if (searchTerm && !entry.raw.toLowerCase().includes(searchTerm)) return false;
  return true;
}

function renderEntry(entry) {
  const color = colorFor(entry.category);
  const ts = entry.timestamp.split("T")[1]?.replace("Z","") || entry.timestamp;
  return `<div class="log-entry">
    <div class="meta">
      <span class="ts">${esc(ts)}</span>
      <span class="cat" style="background:${color}22;color:${color}">${esc(entry.category)}</span>
    </div>
    <div class="msg">${esc(entry.message)}</div>
  </div>`;
}

function rerender() {
  const visible = allEntries.filter(shouldShow);
  if (visible.length === 0) {
    logArea.innerHTML = '<div class="empty">No matching entries</div>';
    return;
  }
  const atBottom = logArea.scrollTop + logArea.clientHeight >= logArea.scrollHeight - 10;
  logArea.innerHTML = visible.map(renderEntry).join("");
  if (autoscrollBox.checked && (atBottom || visible.length <= 5)) {
    logArea.scrollTop = logArea.scrollHeight;
  }
}

function updateCategoryList() {
  const counts = {};
  for (const e of allEntries) {
    counts[e.category] = (counts[e.category] || 0) + 1;
  }
  const cats = Object.keys(counts).sort();
  catList.innerHTML = cats.map(cat => {
    const checked = enabledCats.size === 0 || enabledCats.has(cat) ? "checked" : "";
    const color = colorFor(cat);
    return `<div class="cat-item">
      <span class="badge" style="background:${color}"></span>
      <input type="checkbox" id="cat-${cat}" ${checked}>
      <span class="name">${esc(cat)}</span>
      <span class="count">${counts[cat]}</span>
    </div>`;
  }).join("");

  for (const cat of cats) {
    const cb = document.getElementById("cat-" + cat);
    cb.addEventListener("change", () => {
      if (cb.checked) {
        enabledCats.add(cat);
        // If all are checked, clear the filter (show all)
        if (enabledCats.size === cats.length) enabledCats.clear();
      } else {
        // If was showing all (empty set), populate all then remove this one
        if (enabledCats.size === 0) {
          for (const c of cats) enabledCats.add(c);
        }
        enabledCats.delete(cat);
      }
      // Sync checkbox states
      for (const c of cats) {
        const checkbox = document.getElementById("cat-" + c);
        if (checkbox) checkbox.checked = enabledCats.size === 0 || enabledCats.has(c);
      }
      rerender();
    });
  }
}

function addEntry(entry) {
  allEntries.push(entry);
}

// Initial load
fetch("/api/logs")
  .then(r => r.json())
  .then(entries => {
    for (const e of entries) addEntry(e);
    updateCategoryList();
    rerender();
  })
  .catch(() => {
    logArea.innerHTML = '<div class="empty">Failed to load logs</div>';
  });

// SSE for real-time
function connectSSE() {
  const es = new EventSource("/api/events");
  es.onopen = () => {
    connStatus.textContent = "live";
    connStatus.className = "conn-status live";
  };
  es.onmessage = (ev) => {
    try {
      const entry = JSON.parse(ev.data);
      addEntry(entry);
      updateCategoryList();
      // Only re-render the new entry if it passes the filter (avoid full re-render for perf)
      if (shouldShow(entry)) {
        const atBottom = logArea.scrollTop + logArea.clientHeight >= logArea.scrollHeight - 50;
        logArea.insertAdjacentHTML("beforeend", renderEntry(entry));
        if (autoscrollBox.checked && atBottom) {
          logArea.scrollTop = logArea.scrollHeight;
        }
      }
      // Update chart if in chart view and relevant data arrived
      if (currentView === "chart" && (entry.category === "token-usage" || entry.category === "context-manager")) {
        updateChart();
      }
    } catch {}
  };
  es.onerror = () => {
    connStatus.textContent = "disconnected";
    connStatus.className = "conn-status dead";
    es.close();
    setTimeout(connectSSE, 3000);
  };
}
connectSSE();

// Search
let searchTimer;
searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = searchInput.value.trim().toLowerCase();
    rerender();
  }, 150);
});

// --- Chart ---
const btnLogs = document.getElementById("btnLogs");
const btnChart = document.getElementById("btnChart");
const chartArea = document.getElementById("chartArea");
let currentView = "logs";
let tokenChart = null;

btnLogs.addEventListener("click", () => switchView("logs"));
btnChart.addEventListener("click", () => switchView("chart"));

function switchView(view) {
  currentView = view;
  if (view === "logs") {
    btnLogs.classList.add("active");
    btnChart.classList.remove("active");
    logArea.style.display = "";
    chartArea.style.display = "none";
  } else {
    btnChart.classList.add("active");
    btnLogs.classList.remove("active");
    logArea.style.display = "none";
    chartArea.style.display = "";
    updateChart();
  }
}

function extractChartData() {
  const usage = [];     // {x: index, y: accumulated, ts: timestamp}
  const savings = [];   // {x: index, y: saved, ts: timestamp}
  let idx = 0;
  for (const e of allEntries) {
    if (e.category === "token-usage") {
      const m = e.message.match(/accumulated=(\d+)/);
      if (m) {
        idx++;
        usage.push({ x: idx, y: +m[1], ts: e.timestamp });
      }
    }
    if (e.category === "context-manager") {
      const m = e.message.match(/saved ~(\d+) tokens/);
      if (m) savings.push({ x: idx, y: +m[1], ts: e.timestamp });
    }
  }
  return { usage, savings };
}

function updateChart() {
  const { usage, savings } = extractChartData();

  if (!tokenChart) {
    const ctx = document.getElementById("tokenChart").getContext("2d");
    tokenChart = new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            label: "Accumulated tokens",
            data: usage,
            borderColor: "#7aa2f7",
            backgroundColor: "rgba(122,162,247,0.1)",
            borderWidth: 2,
            tension: 0.2,
            fill: true,
            pointRadius: 3,
          },
          {
            label: "Cleanup savings",
            data: savings,
            borderColor: "#9ece6a",
            backgroundColor: "#9ece6a",
            showLine: false,
            pointRadius: 6,
            pointStyle: "rectRot",
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: "#c0caf5", font: { size: 12 } } },
          tooltip: {
            callbacks: {
              title: (items) => items[0]?.raw?.ts ?? "",
              label: (item) => {
                if (item.datasetIndex === 0) return `Tokens: ${item.raw.y}`;
                return `Saved: ${item.raw.y} tokens`;
              },
            },
          },
        },
        scales: {
          x: {
            type: "linear",
            title: { display: true, text: "LLM iteration", color: "#565f89" },
            ticks: { color: "#565f89" },
            grid: { color: "rgba(59,66,97,0.3)" },
          },
          y: {
            title: { display: true, text: "Tokens", color: "#565f89" },
            ticks: { color: "#565f89" },
            grid: { color: "rgba(59,66,97,0.3)" },
          },
        },
      },
    });
  } else {
    tokenChart.data.datasets[0].data = usage;
    tokenChart.data.datasets[1].data = savings;
    tokenChart.update("none");
  }
}

// Update chart on new SSE data if in chart view
</script>
</body>
</html>
